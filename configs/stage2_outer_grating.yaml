# Stage 2 — concentric curved metagrating stabilization zone.
# Assumes a fixed PhC reflector (frozen_phc below). Replace those numbers
# with the best design from Stage 1 to chain the two stages.
stage: 2
name: stage2_outer_grating
material: SiN

thickness_range_nm: [200, 1000]
nir_band_nm: [1350, 1650]
mir_band_nm: [8000, 14000]

fabrication:
  mode: mode_a
  min_feature_nm: 100
  min_gap_nm: 100
  fill_fraction_range: [0.001, 0.999]

# Frozen PhC parameters — supply from Stage 1 result or tune manually.
frozen_phc:
  lattice_family: triangular
  n_rings: 6
  thickness_nm: 500
  lattice_period_nm: 1500
  hole_a_nm: 400
  hole_b_nm: 400
  hole_rotation_deg: 0
  corner_rounding: 0.8
  shape_parameter: 6

primary_objective: stabilization

objectives:
  nir_reflectance:
    band_nm: [1350, 1650]
    n_points: 30
    mean_weight: 1.0
    min_weight: 0.0
    weight: 0.4
  mir_emissivity:
    band_nm: [8000, 14000]
    n_points: 30
    weight: 0.3
  stabilization:
    mode: asymmetry           # "asymmetry" or "radial_momentum"
    nir_band_nm: [1350, 1650]
    weight: 1.0
  fabrication_penalty:
    weight: 0.5

mobo:
  n_init: 12
  n_iterations: 15
  batch_size: 1
  sampling: sobol
  acqf_num_restarts: 5
  acqf_raw_samples: 64
  acqf_mc_samples: 128
  device: cpu
  dtype: double
  ref_point_margin: 0.1
  seed: 45
