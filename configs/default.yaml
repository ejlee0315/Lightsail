# Default configuration for SiN lightsail optimization
material: SiN

# Design bounds
thickness_range_nm: [200, 1000]
nir_band_nm: [1350, 1650]
mir_band_nm: [8000, 14000]

# Fabrication constraints (Mode A)
fabrication:
  mode: mode_a
  min_feature_nm: 500
  min_gap_nm: 500
  fill_fraction_range: [0.05, 0.60]

# Stage 1: PhC Reflector
stage1:
  # Discrete lattice choice — one of: triangular, hexagonal, pentagonal_supercell
  lattice_family: triangular
  n_rings: 6           # radial extent of the PhC patch
  n_iterations: 50
  batch_size: 1
  objectives:
    nir_reflectance:
      band_nm: [1350, 1650]
      n_points: 30
      mean_weight: 0.7
      min_weight: 0.3
      weight: 1.0
    mir_emissivity:
      band_nm: [8000, 14000]
      n_points: 30
      weight: 0.8
    mass_and_fab:
      mass_weight: 0.3
      fab_weight: 0.7
      mass_reference_nm3: 5.0e8
      weight: 0.5

# Stage 2: MetaGrating
stage2:
  n_iterations: 50
  batch_size: 1
  objectives:
    nir_reflectance:
      band_nm: [1350, 1650]
      n_points: 30
      mean_weight: 1.0
      min_weight: 0.0
      weight: 0.4
    mir_emissivity:
      band_nm: [8000, 14000]
      n_points: 30
      weight: 0.3
    stabilization:
      mode: asymmetry      # "asymmetry" or "radial_momentum"
      nir_band_nm: [1350, 1650]
      weight: 1.0
    fabrication_penalty:
      weight: 0.5

# Multi-objective BO runner
mobo:
  stage1:
    n_init: 16
    n_iterations: 20
    batch_size: 1
    sampling: sobol          # "sobol" or "lhs"
    acqf_num_restarts: 5
    acqf_raw_samples: 64
    acqf_mc_samples: 128
    device: cpu              # "cpu" or "mps"
    dtype: double            # "double" or "float"
    ref_point_margin: 0.1
  stage2:
    n_init: 12
    n_iterations: 15
    batch_size: 1
    sampling: sobol
    acqf_num_restarts: 5
    acqf_raw_samples: 64
    acqf_mc_samples: 128
    device: cpu
    dtype: double
    ref_point_margin: 0.1

# Optimization
seed: 42
